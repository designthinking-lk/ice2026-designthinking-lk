<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICE — Innovation &amp; Collaboration</title>
  <meta name="description" content="ICE workshops — meet the mentors and participants, form teams, and build together. Hosted by DT@SL.">

  <link rel="canonical" href="https://ice2026.designthinking.lk/">

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack, iMessage, Discord) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ICE — Design Thinking Workshops">
  <meta property="og:title" content="ICE — Design Thinking Workshops">
  <meta property="og:description" content="Meet the mentors and participants, form teams, and build together. Hosted by DT@SL.">
  <meta property="og:url" content="https://ice2026.designthinking.lk/">
  <meta property="og:image" content="https://ice2026.designthinking.lk/assets/og-image-v2.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="ICE — Design Thinking Workshops by DT@SL, designthinking.lk">
  <meta property="og:locale" content="en_US">

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ICE — Design Thinking Workshops">
  <meta name="twitter:description" content="Meet the mentors and participants, form teams, and build together. Hosted by DT@SL.">
  <meta name="twitter:image" content="https://ice2026.designthinking.lk/assets/og-image-v2.jpg">
  <meta name="twitter:image:alt" content="ICE — Design Thinking Workshops by DT@SL, designthinking.lk">

  <!-- Icons + installable PWA -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#6100FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ICE">

  <!-- Fonts: AHLab kit (Neue Haas Grotesk); graceful fallback stacks in CSS -->
  <link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
  <!-- Icons: Font Awesome Free -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- bump ?v= on any asset change: GitHub Pages caches for 10 min -->
  <link rel="stylesheet" href="css/theme.css?v=51">
  <link rel="stylesheet" href="css/app.css?v=73">
  <!-- apply the saved theme before first paint so night mode never flashes -->
  <script>try{if(localStorage.getItem('ice.theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
  <!-- desktop-first: phones get the "open on desktop" gate (markup below, styles in app.css) -->
  <script>if(/Mobi|Opera Mini/i.test(navigator.userAgent))document.documentElement.classList.add('is-mobile');</script>
  <!-- installable PWA: sw.js is network-first, so it never serves stale content while online -->
  <script>if('serviceWorker' in navigator)addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});</script>
</head>
<body>
  <!-- rounded-corner octagon clip — scales with any element (objectBoundingBox) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <clipPath id="octr" clipPathUnits="objectBoundingBox">
        <path d="M 0.2476 0.0424 Q 0.29 0 0.35 0 L 0.65 0 Q 0.71 0 0.7524 0.0424 L 0.9576 0.2476 Q 1 0.29 1 0.35 L 1 0.65 Q 1 0.71 0.9576 0.7524 L 0.7524 0.9576 Q 0.71 1 0.65 1 L 0.35 1 Q 0.29 1 0.2476 0.9576 L 0.0424 0.7524 Q 0 0.71 0 0.65 L 0 0.35 Q 0 0.29 0.0424 0.2476 Z"/>
      </clipPath>
    </defs>
  </svg>

  <!-- mobile gate — shown instead of the app when the head UA sniff tags
       <html> with .is-mobile; the layout is desktop-only for now -->
  <div class="mobile-gate" role="alert">
    <i class="fa-solid fa-desktop" aria-hidden="true"></i>
    <h1>Best on a bigger screen</h1>
    <p>Our mobile experience is still being crafted. Please open this page in a desktop browser for the optimal experience.</p>
    <span class="mg-brand">ICE &mdash; Design Thinking Workshops</span>
  </div>

  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <!-- decorative half octagon: same shape family as the hive tiles, its
           other half overflowing off-screen; the nav sits inside it -->
      <span class="side-oct" aria-hidden="true"></span>
      <div class="sidebar-top">
        <a class="brand" href="#/"><span class="brand-name">ICE</span></a>
      </div>
      <!-- project switcher — filled by app.js when more than one project is visible -->
      <div class="project-switcher" id="projectSwitcher" hidden></div>
      <nav class="nav" id="nav">
        <a href="#/people" data-nav="people" title="People"><i class="fa-solid fa-users"></i><span>People</span></a>
        <a href="#/projects" data-nav="projects" id="navProjects" title="Projects"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
        <a href="#/skills" data-nav="skills" id="navSkills" title="Skills"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Skills</span></a>
        <!-- always-present bottom spacer: keeps the links centred no matter
             which bottom items are hidden -->
        <span class="nav-spacer" aria-hidden="true"></span>
        <!-- fixed-height bottom zone: admin appearing/disappearing must
             never move the centred links above -->
        <div class="nav-bottom">
          <a href="#/admin" data-nav="admin" id="navAdmin" class="nav-admin" title="Admin" hidden><i class="fa-solid fa-gear"></i><span>Admin</span></a>
        </div>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <!-- team filter chips (People view only) — filled by app.js -->
        <div class="topbar-teams" id="topbarTeams"></div>
        <button class="theme-toggle" id="themeToggle" type="button" data-action="toggle-theme" aria-label="Toggle night mode" title="Night mode">
          <i class="fa-solid fa-moon"></i>
        </button>
        <div class="topbar-actions" id="topbarActions">
          <!-- filled by app.js: sign-in button, register button + avatar menu -->
        </div>
        <div id="menuPop" class="menu-pop" hidden></div>
      </header>
      <main id="view" class="view"></main>
    </div>

    <aside class="commpane" id="chatpane" hidden aria-label="Chat and broadcasts">
      <div class="commpane-head">
        <div class="comm-tabs" role="tablist">
          <button class="comm-tab active" type="button" data-action="comm-tab" data-tab="chat" id="commTabChat">Chat</button>
          <button class="comm-tab" type="button" data-action="comm-tab" data-tab="broadcast" id="commTabBroadcast">Broadcast</button>
        </div>
        <button class="chatpane-close" type="button" data-action="toggle-chat" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="chatpane-body" id="chatpaneBody"></div>
      <div class="commpane-foot" id="commFoot"></div>
    </aside>
  </div>

  <!-- floating bottom-right cluster: about + program + tools + chat & broadcasts -->
  <div class="fab-stack">
    <a href="#/about" data-nav="about" id="navAbout" class="tools-fab" title="About the program"><i class="fa-regular fa-circle-question"></i><span>About</span></a>
    <a href="#/program" data-nav="program" id="navProgram" class="tools-fab" title="Program" hidden><i class="fa-regular fa-calendar-days"></i><span>Program</span></a>
    <a href="#/tools" data-nav="tools" id="navTools" class="tools-fab" title="Tools" hidden><i class="fa-solid fa-toolbox"></i><span>Tools</span></a>
    <button type="button" class="chat-fab" id="navChatBtn" data-action="toggle-chat" title="Chat &amp; broadcasts" hidden>
      <i class="fa-regular fa-comments"></i>
      <span class="chat-badge" id="chatBadge" hidden>0</span>
    </button>
  </div>

  <!-- public-view credit + sponsors — hidden once signed in (renderChrome) -->
  <footer class="site-credit" id="siteCredit" hidden>
    <span class="credit-line">Workshop by <a class="credit-name" href="https://suranga.info" target="_blank" rel="noopener">Prof. Suranga Nanayakkara</a></span>
    <span class="credit-support">supported by</span>
    <span class="credit-logos">
      <a href="https://ahlab.org" target="_blank" rel="noopener" title="Augmented Human Lab"><img src="assets/ahlab-black.svg" alt="Augmented Human Lab"></a>
      <a href="https://nus.edu.sg" target="_blank" rel="noopener" title="National University of Singapore"><img class="nus" src="assets/nus-central-black.png" alt="National University of Singapore"></a>
      <span class="credit-sha">SHA Foundation</span>
    </span>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="modalRoot"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/config.js?v=51"></script>
  <script src="js/api.js?v=51"></script>
  <script src="js/chat.js?v=71"></script>
  <script src="js/app.js?v=73"></script>
</body>
</html>
