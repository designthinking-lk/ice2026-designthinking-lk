<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICE2026 — Innovation &amp; Collaboration</title>
  <meta name="description" content="ICE2026 — meet the mentors and participants, form teams, and build together. Hosted by the Augmented Human Lab.">

  <!-- Social cards -->
  <meta property="og:title" content="ICE2026">
  <meta property="og:description" content="Meet the mentors and participants, form teams, and build together.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#6100FF">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Fonts: AHLab kit (Neue Haas Grotesk); graceful fallback stacks in CSS -->
  <link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
  <!-- Icons: Font Awesome Free -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">ICE<span class="brand-year">2026</span></span>
      </a>
      <nav class="nav" id="nav">
        <a href="#/" data-nav="home"><i class="fa-solid fa-users"></i><span>People</span></a>
        <a href="#/teams" data-nav="teams"><i class="fa-solid fa-people-group"></i><span>Teams</span></a>
        <a href="#/announcements" data-nav="announcements"><i class="fa-solid fa-bullhorn"></i><span>News</span></a>
        <a href="#/messages" data-nav="messages" id="navMessages" hidden>
          <i class="fa-solid fa-message"></i><span>Messages</span><b class="badge" id="unreadBadge" hidden></b>
        </a>
      </nav>
      <div class="topbar-actions" id="topbarActions">
        <!-- filled by app.js: sign-in button or avatar menu -->
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
    </div>
  </header>

  <main id="view" class="container view"></main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <span class="footer-brand">ICE2026</span>
        <span class="footer-sep">·</span>
        <a href="https://ahlab.org" target="_blank" rel="noopener">Augmented Human Lab</a>
      </div>
      <div class="footer-links">
        <a href="#/announcements">Announcements</a>
        <a href="#/teams">Teams</a>
        <a href="mailto:info@ahlab.org"><i class="fa-regular fa-envelope"></i> Contact</a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="modalRoot"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
