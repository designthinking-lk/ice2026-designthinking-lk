<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICE — Innovation &amp; Collaboration</title>
  <meta name="description" content="ICE workshops — meet the mentors and participants, form teams, and build together. Hosted by the Augmented Human Lab.">

  <!-- Social cards -->
  <meta property="og:title" content="ICE — Design Thinking Workshops">
  <meta property="og:description" content="Meet the mentors and participants, form teams, and build together.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#6100FF">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Fonts: AHLab kit (Neue Haas Grotesk); graceful fallback stacks in CSS -->
  <link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
  <!-- Icons: Font Awesome Free -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- bump ?v= on any asset change: GitHub Pages caches for 10 min -->
  <link rel="stylesheet" href="css/theme.css?v=13">
  <link rel="stylesheet" href="css/app.css?v=13">
  <!-- apply the saved theme before first paint so night mode never flashes -->
  <script>try{if(localStorage.getItem('ice.theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
</head>
<body>
  <!-- rounded-corner octagon clip — scales with any element (objectBoundingBox) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <clipPath id="octr" clipPathUnits="objectBoundingBox">
        <path d="M 0.2476 0.0424 Q 0.29 0 0.35 0 L 0.65 0 Q 0.71 0 0.7524 0.0424 L 0.9576 0.2476 Q 1 0.29 1 0.35 L 1 0.65 Q 1 0.71 0.9576 0.7524 L 0.7524 0.9576 Q 0.71 1 0.65 1 L 0.35 1 Q 0.29 1 0.2476 0.9576 L 0.0424 0.7524 Q 0 0.71 0 0.65 L 0 0.35 Q 0 0.29 0.0424 0.2476 Z"/>
      </clipPath>
    </defs>
  </svg>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <!-- decorative half octagon: same shape family as the hive tiles, its
           other half overflowing off-screen; the nav sits inside it -->
      <span class="side-oct" aria-hidden="true"></span>
      <div class="sidebar-top">
        <a class="brand" href="#/"><span class="brand-name">ICE</span></a>
      </div>
      <!-- project switcher — filled by app.js when more than one project is visible -->
      <div class="project-switcher" id="projectSwitcher" hidden></div>
      <nav class="nav" id="nav">
        <a href="#/" data-nav="home" title="People"><i class="fa-solid fa-users"></i><span>People</span></a>
        <a href="#/projects" data-nav="projects" id="navProjects" title="Projects"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
        <a href="#/tools" data-nav="tools" id="navTools" title="Tools" hidden><i class="fa-solid fa-toolbox"></i><span>Tools</span></a>
        <a href="https://chat.google.com" target="_blank" rel="noopener" id="navMessages" title="Messages" hidden>
          <i class="fa-solid fa-message"></i><span>Messages</span><i class="fa-solid fa-arrow-up-right-from-square ext"></i>
        </a>
        <!-- always-present bottom spacer: keeps the links centred no matter
             which of the chat/admin items below are hidden -->
        <span class="nav-spacer" aria-hidden="true"></span>
        <!-- fixed-height bottom zone: chat + admin appearing/disappearing must
             never move the centred links above -->
        <div class="nav-bottom">
          <!-- chat & broadcasts — icon only (news lives in its Broadcast tab) -->
          <button type="button" class="nav-chat" id="navChatBtn" data-action="toggle-chat" title="Chat &amp; broadcasts" hidden>
            <i class="fa-regular fa-comments"></i>
          </button>
          <a href="#/admin" data-nav="admin" id="navAdmin" class="nav-admin" title="Admin" hidden><i class="fa-solid fa-gear"></i><span>Admin</span></a>
        </div>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <!-- team filter chips (People view only) — filled by app.js -->
        <div class="topbar-teams" id="topbarTeams"></div>
        <button class="theme-toggle" id="themeToggle" type="button" data-action="toggle-theme" aria-label="Toggle night mode" title="Night mode">
          <i class="fa-solid fa-moon"></i>
        </button>
        <div class="topbar-actions" id="topbarActions">
          <!-- filled by app.js: sign-in button, register button + avatar menu -->
        </div>
        <div id="menuPop" class="menu-pop" hidden></div>
      </header>
      <main id="view" class="view"></main>
    </div>

    <aside class="commpane" id="chatpane" hidden aria-label="Chat and broadcasts">
      <div class="commpane-head">
        <div class="comm-tabs" role="tablist">
          <button class="comm-tab active" type="button" data-action="comm-tab" data-tab="chat" id="commTabChat">Chat</button>
          <button class="comm-tab" type="button" data-action="comm-tab" data-tab="broadcast" id="commTabBroadcast">Broadcast</button>
        </div>
        <button class="chatpane-close" type="button" data-action="toggle-chat" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="chatpane-body" id="chatpaneBody"></div>
      <div class="commpane-foot" id="commFoot"></div>
    </aside>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="modalRoot"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/config.js?v=13"></script>
  <script src="js/api.js?v=13"></script>
  <script src="js/chat.js?v=13"></script>
  <script src="js/app.js?v=13"></script>
</body>
</html>
