<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICE2026 — Innovation &amp; Collaboration</title>
  <meta name="description" content="ICE2026 — meet the mentors and participants, form teams, and build together. Hosted by the Augmented Human Lab.">

  <!-- Social cards -->
  <meta property="og:title" content="ICE2026">
  <meta property="og:description" content="Meet the mentors and participants, form teams, and build together.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#6100FF">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Fonts: AHLab kit (Neue Haas Grotesk); graceful fallback stacks in CSS -->
  <link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
  <!-- Icons: Font Awesome Free -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Expand menu" title="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a class="brand" href="#/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">ICE<span class="brand-year">2026</span></span>
      </a>
      <nav class="nav" id="nav">
        <a href="#/" data-nav="home" title="People"><i class="fa-solid fa-users"></i><span>People</span></a>
        <a href="#/teams" data-nav="teams" title="Teams"><i class="fa-solid fa-people-group"></i><span>Teams</span></a>
        <a href="#/projects" data-nav="projects" id="navProjects" title="Projects" hidden><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
        <a href="#/tools" data-nav="tools" id="navTools" title="Tools" hidden><i class="fa-solid fa-toolbox"></i><span>Tools</span></a>
        <a href="#/announcements" data-nav="announcements" title="News"><i class="fa-solid fa-bullhorn"></i><span>News</span></a>
        <a href="https://chat.google.com" target="_blank" rel="noopener" id="navMessages" title="Messages" hidden>
          <i class="fa-solid fa-message"></i><span>Messages</span><i class="fa-solid fa-arrow-up-right-from-square ext"></i>
        </a>
        <a href="#/admin" data-nav="admin" id="navAdmin" class="nav-admin" title="Admin" hidden><i class="fa-solid fa-gear"></i><span>Admin</span></a>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-actions" id="topbarActions">
          <!-- filled by app.js: sign-in button, register button + avatar menu -->
        </div>
      </header>
      <main id="view" class="view"></main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="modalRoot"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
